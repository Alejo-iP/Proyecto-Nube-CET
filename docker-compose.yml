services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=AdminNube2026!
      - MYSQL_DATABASE=nextcloud_db
      - MYSQL_USER=nextcloud_user
      - MYSQL_PASSWORD=NextcloudSecret2026!
    volumes:
      - ./db:/var/lib/mysql

  app:
    image: nextcloud:latest
    restart: always
    ports:
      - "80:80"
    environment:
      - MYSQL_PASSWORD=NextcloudSecret2026!
      - MYSQL_DATABASE=nextcloud_db
      - MYSQL_USER=nextcloud_user
      - MYSQL_HOST=db
    volumes:
      - ./nextcloud:/var/www/html
    depends_on:
      - db
